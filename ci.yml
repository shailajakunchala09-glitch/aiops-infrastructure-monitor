name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aiops_user
          POSTGRES_PASSWORD: aiops_password
          POSTGRES_DB: aiops_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aiops_user -d aiops_test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app

      - name: Run Alembic migrations against test DB
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://aiops_user:aiops_password@localhost:5432/aiops_test_db
        run: alembic upgrade head

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://aiops_user:aiops_password@localhost:5432/aiops_test_db
          SECRET_KEY: ci-test-secret
        run: pytest ../tests --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint --if-present

      - name: Build production bundle
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Image Build Validation
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t aiops-backend:ci .

      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile -t aiops-frontend:ci .

      - name: Build monitoring-agent image
        run: docker build -f docker/agent.Dockerfile -t aiops-agent:ci .
